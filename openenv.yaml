name: automind-openenv
version: "1.0.0"

description: >
  AutoMind OpenEnv is a real-world automotive diagnosis, driving-decision,
  and autonomous-control environment. It simulates ECU and TCU telemetry,
  failures, traffic, GPS-aware service recommendation, reward shaping,
  deterministic graders, and a live HTTP interface.

entrypoint: main:app

endpoints:
  reset: /reset
  step: /step
  state: /state

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - brake
        - accelerate
        - turn_left
        - turn_right
        - continue
        - stop
        - request_service
    value:
      type: number
      minimum: 0.0
      maximum: 1.0
    reason:
      type: string

observation_space:
  type: object
  properties:
    speed: { type: number }
    rpm: { type: number }
    throttle: { type: number }
    gear: { type: integer }
    engine_load: { type: number }
    transmission_load: { type: number }
    fuel_rate: { type: number }
    acceleration: { type: number }
    engine_temp: { type: number }
    distance_to_obstacle: { type: number }
    road_condition:
      type: string
      enum: [dry, wet, rain]
    drive_mode:
      type: string
      enum: [idle, city, cruise, sport]
    oil_level: { type: number }
    battery_health: { type: number }
    latitude: { type: number }
    longitude: { type: number }
    heading: { type: number }
    failures: { type: object }
    history: { type: array }

tasks:
  - name: fault_diagnosis
    description: Detect overheating, low oil, or battery issue
    difficulty: easy

  - name: driving_decision
    description: Choose safe driving actions from live telemetry
    difficulty: medium

  - name: autonomous_control
    description: Full diagnosis + control + override + service recommendation
    difficulty: hard

environment:
  max_steps: 20
  deterministic: true

author: CosmoTech Team